<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin Clarisse</title>
  <meta name="theme-color" content="#8c5be9">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing:border-box; }
    body {
      margin:0;
      overflow-x:hidden;
      font-family:Inter, Arial, sans-serif;
      background:linear-gradient(180deg,#8c5be9 0,#f3ecff 22%,#ffffff 100%);
      color:#241a55;
    }
    h1,h2,h3,button { font-family:Poppins, Inter, Arial, sans-serif; }
    .wrap { max-width:1100px; margin:0 auto; padding:12px 8px; }
    .card {
      background:rgba(255,255,255,.96);
      border-radius:20px;
      padding:14px;
      box-shadow:0 14px 34px rgba(52,26,115,.12);
    }
    .topbar {
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-bottom:14px;
    }
    .helper {
      color:#6f6894;
      line-height:1.5;
      font-size:.94rem;
      margin-top:6px;
    }
    .actions {
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .actions button {
      width:100%;
      border:0;
      border-radius:14px;
      padding:14px 16px;
      color:#fff;
      font-size:.94rem;
      font-weight:700;
      cursor:pointer;
    }
    .primary { background:linear-gradient(135deg,#ea79c7,#8c5be9); }
    .secondary { background:linear-gradient(135deg,#59d8c5,#2baca8); }
    .stats {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin:16px 0;
    }
    .stat {
      background:#fff;
      border:2px solid #eadffd;
      border-radius:18px;
      padding:14px;
    }
    .stat-number {
      font-size:1.6rem;
      font-weight:800;
      line-height:1;
    }
    .stat-label {
      color:#6c6591;
      font-size:.84rem;
      margin-top:6px;
      line-height:1.3;
    }
    .filters {
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom:14px;
    }
    input, select {
      width:100%;
      border:2px solid #eadffd;
      border-radius:14px;
      padding:13px 14px;
      font:inherit;
      color:#241a55;
      background:#fff;
    }
    .table-wrap {
      overflow:auto;
      border:2px solid #eadffd;
      border-radius:18px;
      background:#fff;
      -webkit-overflow-scrolling:touch;
    }
    table {
      width:100%;
      min-width:700px;
      border-collapse:collapse;
    }
    th, td {
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid #f0eaff;
      vertical-align:top;
      font-size:.92rem;
    }
    th {
      background:#faf7ff;
      position:sticky;
      top:0;
      z-index:1;
      font-size:.84rem;
    }
    .pill {
      display:inline-block;
      padding:7px 10px;
      border-radius:999px;
      font-size:.78rem;
      font-weight:700;
      white-space:nowrap;
    }
    .sim { background:#e9fbf3; color:#1f9d73; }
    .nao { background:#fff0f3; color:#d33b5b; }
    .small { color:#6c6591; font-size:.84rem; }
    @media (min-width:760px) {
      .wrap { padding:18px; }
      .card { padding:18px; border-radius:24px; }
      .topbar {
        flex-direction:row;
        justify-content:space-between;
        align-items:flex-start;
      }
      .actions { flex-direction:row; }
      .actions button { width:auto; min-width:180px; }
      .stats { grid-template-columns:repeat(4,minmax(0,1fr)); }
      .filters { flex-direction:row; }
      th, td { padding:13px 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <div>
          <h1>Painel da anfitriã</h1>
          <p class="helper">Lista de convidados atualizada automaticamente. O painel atualiza sozinho a cada 15 segundos.</p>
        </div>
        <div class="actions">
          <button id="refreshBtn" class="primary" type="button">Atualizar agora</button>
          <button id="exportBtn" class="secondary" type="button">Exportar XLSX</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><div id="totalCount" class="stat-number">0</div><div class="stat-label">Total de respostas</div></div>
        <div class="stat"><div id="simCount" class="stat-number">0</div><div class="stat-label">Confirmações</div></div>
        <div class="stat"><div id="naoCount" class="stat-number">0</div><div class="stat-label">Não irão</div></div>
        <div class="stat"><div id="pessoasCount" class="stat-number">0</div><div class="stat-label">Total de pessoas</div></div>
      </div>

      <div class="filters">
        <input id="search" placeholder="Buscar por nome, telefone ou observação">
        <select id="presenceFilter">
          <option value="Todos">Todos</option>
          <option value="Sim">Somente confirmações</option>
          <option value="Não">Somente não irão</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Enviado em</th>
              <th>Nome</th>
              <th>Presença</th>
              <th>Adultos + crianças</th>
              <th>Telefone</th>
              <th>Observações</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwa8zITKdZIdUqib__t0iIbK0Fe884CG1PwbJk9rFXH-g4KfB4gTM_os1VGsUpgStik/exec";
    const tbody = document.getElementById("tbody");
    const totalCount = document.getElementById("totalCount");
    const simCount = document.getElementById("simCount");
    const naoCount = document.getElementById("naoCount");
    const pessoasCount = document.getElementById("pessoasCount");
    const searchInput = document.getElementById("search");
    const presenceFilter = document.getElementById("presenceFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const exportBtn = document.getElementById("exportBtn");

    let allRows = [];

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function renderTable() {
      const q = searchInput.value.trim().toLowerCase();
      const f = presenceFilter.value;

      const filtered = allRows.filter(row => {
        const matchesSearch = !q || [row.nome, row.telefone, row.observacoes].join(" ").toLowerCase().includes(q);
        const matchesPresence = f === "Todos" || row.presenca === f;
        return matchesSearch && matchesPresence;
      });

      tbody.innerHTML = filtered.map(row => `
        <tr>
          <td class="small">${escapeHtml(row.enviadoEm)}</td>
          <td>${escapeHtml(row.nome)}</td>
          <td><span class="pill ${row.presenca === 'Sim' ? 'sim' : 'nao'}">${escapeHtml(row.presenca)}</span></td>
          <td>${escapeHtml(row.acompanhantes)}</td>
          <td>${escapeHtml(row.telefone)}</td>
          <td>${escapeHtml(row.observacoes)}</td>
        </tr>
      `).join("");

      totalCount.textContent = filtered.length;
      simCount.textContent = filtered.filter(r => r.presenca === "Sim").length;
      naoCount.textContent = filtered.filter(r => r.presenca === "Não").length;
      pessoasCount.textContent = filtered
        .filter(r => r.presenca === "Sim")
        .reduce((acc, r) => acc + (parseInt(r.acompanhantes || "0", 10) || 0), 0);
    }

    async function loadData() {
      try {
        const response = await fetch(GOOGLE_SCRIPT_URL + "?action=list");
        const data = await response.json();
        allRows = Array.isArray(data.rows) ? data.rows : [];
        renderTable();
      } catch (e) {
        console.error(e);
      }
    }

    function exportXLSX() {
      const exportRows = allRows.map(r => ({
        "Enviado em": r.enviadoEm || "",
        "Nome": r.nome || "",
        "Presença": r.presenca || "",
        "Adultos + crianças": r.acompanhantes || "",
        "Telefone": r.telefone || "",
        "Observações": r.observacoes || ""
      }));
      const ws = XLSX.utils.json_to_sheet(exportRows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Confirmacoes");
      XLSX.writeFile(wb, "confirmacoes-clarisse.xlsx");
    }

    searchInput.addEventListener("input", renderTable);
    presenceFilter.addEventListener("change", renderTable);
    refreshBtn.addEventListener("click", loadData);
    exportBtn.addEventListener("click", exportXLSX);

    loadData();
    setInterval(loadData, 15000);
  </script>
</body>
</html>
